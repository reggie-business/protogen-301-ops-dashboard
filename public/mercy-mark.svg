<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="Mercy General — Rod of Asclepius">
  <g fill="none" stroke="#2b7a78" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- staff: fills the vertical frame -->
    <line x1="24" y1="3" x2="24" y2="45"/>
    <!-- top knob -->
    <circle cx="24" cy="3" r="2.1" fill="#2b7a78" stroke="none"/>
    <!-- single serpent: four wide coils spanning the staff -->
    <path d="M24 7
             C32 8.5 33 14 24 16
             C15 18 14 23.5 24 25.5
             C34 27.5 33 33 24 35
             C16 36.6 16.5 40.5 23 42.5"/>
    <!-- serpent head curling off -->
    <path d="M23 42.5 c3.4 1 6 -1 5.4 -4"/>
    <circle cx="28.2" cy="38" r="1.15" fill="#2b7a78" stroke="none"/>
  </g>
</svg>
